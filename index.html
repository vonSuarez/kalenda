<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#F1F0ED;--cream2:#f7f0e6;--ww:#FAFAF8;
  --ink:#1C1B18;--soft:#4A4840;--muted:#8B8880;
  --border:#DDDBD6;--border2:#d4c5b0;
  --teal:#1B3D8F;--teal-bg:#e8eef8;--teal-dk:#12286e;
  --amber:#c47a1a;--amber-bg:#fef5e4;
  --coral:#c45535;--coral-bg:#fdf0eb;
  --blue:#2a5fa8;--blue-bg:#eef3fb;
  --purple:#6050b8;--purple-bg:#f1f0fc;
  --green:#3a7a35;--red:#b02020;
  --hover:#ECEAE6;--expand:#F5F4F1;
  --radius:12px
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;font-size:14px;line-height:1.5}

/* HEADER */
header{background:var(--ww);border-bottom:1.5px solid var(--border);padding:0 2rem;position:sticky;top:0;z-index:100}
.hdr-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:10px;height:58px}
.logo{display:flex;align-items:center;gap:11px;flex-shrink:0;text-decoration:none}.logo-mark{display:flex;align-items:center}.logo-text{display:flex;flex-direction:column;gap:0px}.logo-name{font-family:'Trebuchet MS','Gill Sans MT',system-ui,sans-serif;font-size:1.2rem;font-weight:700;color:#1B3D8F;letter-spacing:.12em;line-height:1}.logo-sub{font-family:system-ui,sans-serif;font-size:8px;font-weight:400;color:#6B8BC4;letter-spacing:.3em;text-transform:uppercase;line-height:1;margin-top:3px}
.logo span{color:var(--teal)}
.hdr-date{font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0}
.hdr-right{flex:1;display:flex;align-items:center;gap:8px;justify-content:flex-end}
.hdr-search input{background:var(--cream2);border:1.5px solid var(--border);border-radius:8px;padding:6px 12px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink);outline:none;width:200px;transition:border-color .15s}
.hdr-search input:focus{border-color:var(--teal);background:white}
.hdr-search input::placeholder{color:var(--muted)}
.lang-btn{background:none;border:1.5px solid var(--border2);border-radius:7px;padding:5px 11px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--soft);cursor:pointer;font-weight:500;transition:all .13s;white-space:nowrap}
.lang-btn:hover{border-color:var(--teal);color:var(--teal)}
.lang-btn.en{background:var(--teal);border-color:var(--teal);color:white}

/* SOURCES BAR */
.src-bar{background:var(--cream2);border-bottom:1px solid var(--border);padding:5px 2rem}
.src-inner{max-width:1200px;margin:0 auto;display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.src-lbl{font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;font-weight:500;margin-right:4px}
.src-tag{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--ww);border:1px solid var(--border);color:var(--soft)}

/* LAYOUT */
.wrap{max-width:1440px;margin:0 auto;padding:1.5rem 2rem;display:grid;grid-template-columns:170px minmax(0,1fr) 180px;gap:1.75rem;align-items:start}

/* SIDEBAR */
.sidebar{position:sticky;top:70px;display:flex;flex-direction:column;gap:10px}
.sb-box{background:var(--ww);border:1.5px solid var(--border);border-radius:var(--radius);padding:10px}
.sb-lbl{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);font-weight:500;margin-bottom:6px}
.rb{display:flex;justify-content:space-between;align-items:center;width:100%;text-align:left;background:none;border:none;padding:5px 7px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--soft);cursor:pointer;transition:all .12s;margin-bottom:1px}
.rb:hover{background:var(--teal-bg);color:var(--teal)}
.rb.on{background:var(--teal);color:white;font-weight:500}
.rb.on .rc{opacity:.6}
.rc{font-size:10px;opacity:.4}
.muni-link{display:block;font-size:11px;color:var(--teal);text-decoration:none;padding:2px 0;transition:opacity .12s}
.muni-link:hover{opacity:.7;text-decoration:underline}
.sports-links{display:flex;flex-direction:column;gap:2px}
.sports-link{display:block;font-size:11px;color:var(--teal);text-decoration:none;padding:2px 0}
.sports-link:hover{opacity:.7;text-decoration:underline}

/* CONTENT */
.content{min-width:0;overflow:hidden}
.top-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.dt-tabs{display:flex;background:var(--ww);border:1.5px solid var(--border);border-radius:8px;padding:2px;gap:2px}
.dt{background:none;border:none;padding:5px 11px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:11.5px;color:var(--muted);cursor:pointer;transition:all .12s}
.dt:hover{color:var(--ink)}
.dt.on{background:var(--teal);color:white;font-weight:500}

.cats{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.cp{border:1.5px solid var(--border);background:var(--ww);border-radius:20px;padding:4px 11px;font-size:11.5px;font-family:'DM Sans',sans-serif;color:var(--soft);cursor:pointer;transition:all .12s}
.cp:hover{border-color:var(--teal);color:var(--teal)}
.cp.on{background:var(--teal);border-color:var(--teal);color:white;font-weight:500}

.status-bar{background:var(--ww);border:1.5px solid var(--border);border-radius:8px;padding:7px 12px;font-size:11.5px;color:var(--muted);margin-bottom:10px;display:none;align-items:center;justify-content:space-between;gap:8px}
.status-bar.vis{display:flex}
.stat-cnt{color:var(--soft);font-weight:500}

/* SECTION */
.sec-blk{margin-bottom:18px}
.sec-hd{display:flex;align-items:baseline;gap:8px;margin-bottom:5px}
.sec-hd h3{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:600;color:var(--ink)}
.sec-hd .sc{font-size:11px;color:var(--muted)}
.sec-sub{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;padding-left:2px;font-weight:500}

/* TABLE */
.tbl{width:100%;max-width:100%;background:var(--ww);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;border-collapse:collapse;table-layout:fixed;margin-bottom:4px;table-layout:fixed}
.tbl thead tr{background:var(--cream2);border-bottom:1.5px solid var(--border)}
.tbl thead th{text-align:left;padding:7px 12px;font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.th-event{width:37%}.th-deild{width:18%}.th-date{width:13%;white-space:nowrap}.th-loc{width:0;display:none}.th-time{width:9%;white-space:nowrap;text-align:right}.th-price{width:11%;text-align:right}.th-btn{width:10%;min-width:80px}

.er{border-bottom:.5px solid var(--border);cursor:pointer;transition:background .1s}
.er:last-of-type{border-bottom:none}
.er:hover{background:var(--hover)}
.er.open{background:var(--hover)}
.er td{padding:7px 12px;vertical-align:middle;font-size:12px;color:var(--soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.er td.td-title-cell{white-space:normal;overflow:visible}
.td-t{display:flex;align-items:center;gap:7px}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ev-name{font-weight:500;color:var(--ink);font-size:12.5px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;white-space:normal;line-height:1.35}
.td-deild{font-size:11px;color:var(--soft)}
.td-price{text-align:right;font-size:11.5px}.td-price .pfree{color:var(--blue);font-weight:normal;display:block;text-align:center;width:100%}
.sec-arrow{font-size:11px;color:var(--muted);min-width:12px;transition:transform .15s}
.sec-hd:hover h3{color:var(--teal)}
.syningar-divider{border-top:2px dashed var(--border);margin:28px 0 20px;position:relative}
.syningar-divider::before{content:"— Sýningar úti —";position:absolute;top:-11px;left:50%;transform:translateX(-50%);background:var(--bg);padding:0 12px;font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}
.ppaid{color:var(--soft)}
.see-td{text-align:right;padding:7px 8px !important;white-space:nowrap;min-width:68px}.er td.see-td{overflow:visible}
.sb2{background:none;border:1.5px solid var(--border2);border-radius:5px;padding:2px 7px;font-size:11px;font-family:'DM Sans',sans-serif;color:var(--soft);cursor:pointer;white-space:nowrap;transition:all .12s;display:inline-block}
.sb2:hover{border-color:var(--teal);color:var(--teal)}
.tbl td:nth-child(4),.tbl th:nth-child(4){display:none;width:0;padding:0;border:none}
.sb2.op{background:var(--teal-bg);border-color:var(--teal);color:var(--teal)}

.xr{display:none}
.xr.vis{display:table-row}
.xc{background:var(--expand)!important;border-bottom:.5px solid var(--border);padding:8px 12px 10px 25px!important}
.xi{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}.xi-title{font-weight:500;color:var(--ink);font-size:13px;margin-bottom:4px}
.xd{font-size:11.5px;color:var(--soft);line-height:1.55;flex:1}
.xmeta{font-size:10px;color:var(--muted);margin-top:4px}
.xl{display:inline-flex;align-items:center;gap:3px;background:var(--teal);color:white;text-decoration:none;border-radius:7px;padding:5px 11px;font-size:11px;font-weight:500;white-space:nowrap;flex-shrink:0;transition:background .12s}
.xl:hover{background:var(--teal-dk)}

/* CAT DOT COLORS */
.d-tonleikar{background:var(--purple)}
.d-idrottir {background:var(--coral)}
.d-fotbolti {background:var(--coral)}
.d-handbolti{background:#c44a20}
.d-korfubolti{background:#c06010}
.d-glima    {background:#8860a0}
.d-syningar {background:var(--blue)}
.d-leikhus  {background:var(--teal)}
.d-hatid    {background:var(--amber)}
.d-baejarhátíð{background:#b06010}
.d-namskeið {background:#7050c0}
.d-safn     {background:var(--green)}
.d-born     {background:#d4478a}
.d-utivera  {background:#2d7a40}
.d-spil     {background:#6a3d9a}
.d-stjornmal{background:#1a3a6a}
.d-adrir    {background:#8a5c3a}
.d-annad    {background:#888780}

/* LEAGUE BADGE */
.deild-badge{display:inline-block;font-size:9.5px;padding:1px 6px;border-radius:4px;font-weight:500;white-space:nowrap}
.db-urd{background:#fdf0eb;color:#b84a2a}
.db-1d {background:#fef5e4;color:#b86e0f}
.db-kvd{background:#f1f0fc;color:#6050b8}
.db-bon{background:#e8eef8;color:#1B3D8F}
.db-hand{background:#eef3fb;color:#2a5fa8}
.db-hat{background:#fef5e4;color:#b86e0f}

.no-res{background:var(--ww);border:1.5px solid var(--border);border-radius:var(--radius);text-align:center;padding:2.5rem;color:var(--muted);font-size:13px}
.cal-sidebar{position:sticky;top:74px}.cal-panel{background:var(--ww);border:1.5px solid var(--border);border-radius:var(--radius);padding:10px}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-head span{font-size:12px;font-weight:500;color:var(--ink)}
.cal-nav{background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;padding:2px 6px;border-radius:4px;line-height:1}
.cal-nav:hover{background:var(--cream2);color:var(--ink)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-wd{font-size:9px;text-align:center;color:var(--muted);padding:2px 0;font-weight:500}
.cal-day{font-size:11.5px;text-align:center;padding:4px 2px;border-radius:5px;cursor:pointer;color:var(--soft);border:none;background:none;width:100%;transition:background .1s}
.cal-day:hover{background:var(--teal-bg);color:var(--teal)}
.cal-day.has-events{font-weight:500;color:var(--ink)}
.cal-day.has-events::after{content:"";display:block;width:4px;height:4px;border-radius:50%;background:var(--teal);margin:2px auto 0}
.cal-day.selected{background:var(--teal);color:white}
.cal-day.selected::after{color:rgba(255,255,255,0.7)}
.cal-day.today-mark{border:1.5px solid var(--teal-bg)}
.cal-day.empty{cursor:default;pointer-events:none}
.dt.cal-btn{position:relative}

.spin{display:inline-block;width:11px;height:11px;border:2px solid rgba(255,255,255,0.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}

footer{background:var(--ww);border-top:1px solid var(--border);text-align:center;padding:1.25rem;font-size:11px;color:var(--muted);margin-top:1rem}

@media(max-width:900px){.cal-sidebar{display:none}}
@media(max-width:768px){
  .sb-lbl-toggle{cursor:pointer;display:flex;justify-content:space-between;align-items:center;padding:6px 2px;font-size:12px;letter-spacing:.08em}
  .sb-lbl-toggle:hover{color:var(--teal)}
  #regionArrow{font-size:11px;transition:transform .2s;color:var(--muted)}
  .rList-collapsed{display:none}
  .rList-open{display:flex;flex-wrap:wrap;gap:6px;padding:.25rem 0}

  .wrap{grid-template-columns:1fr;padding:.5rem}
  .sidebar{position:static;display:flex;flex-wrap:wrap;gap:6px;padding:.5rem 0}
  .sb-box{width:100%}
  .rb{font-size:12px;padding:5px 10px}
  header{padding:0 .75rem}
  .logo-text{font-size:18px}
  .hdr-search{display:flex;max-width:100%}
  #si{font-size:14px;padding:6px 10px}
  .dt-tabs{flex-wrap:wrap}
  .dt{font-size:12px;padding:5px 9px}
  .cats{gap:4px}
  .cp{font-size:12px;padding:4px 10px}
  .th-deild,.td-deild,.th-loc,.er td:nth-child(4),.th-date,.td-date,.th-time,.er td:nth-child(5){display:none}
  .tbl{font-size:13px}
  .ev-name{font-size:13px;line-height:1.3}
  .td-price{font-size:12px}
  .sec-hd h3{font-size:14px}
  .sb2{font-size:12px;padding:4px 8px}
  .xr td{font-size:12px;line-height:1.4;padding:8px 6px}
  .th-event{width:60%}
  .th-price{width:25%}
}
@media(max-width:480px){
  .tbl{font-size:12px}
  .ev-name{font-size:12px}
  header{padding:0 .5rem}
  .logo-text{font-size:16px}
}

/* ── Tillaga að viðburð ── */

.free-btn{background:none;border:1.5px solid var(--border);border-radius:20px;padding:5px 14px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--soft);cursor:pointer;transition:all .15s;white-space:nowrap}
.free-btn.on{background:#2d7a35;border-color:#2d7a35;color:#fff}
.free-btn:hover:not(.on){border-color:var(--soft)}

.karfa-btn{background:none;border:1.5px solid var(--border);border-radius:20px;padding:5px 14px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--soft);cursor:pointer;transition:all .15s;white-space:nowrap}
.karfa-btn:hover{border-color:#1B3D8F;color:#1B3D8F}
.karfa-btn.loading{opacity:.6;pointer-events:none}
#karfaNews{background:var(--ww);border:1.5px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:12px;font-size:12.5px;display:none}
#karfaNews h4{margin:0 0 8px;font-size:13px;color:var(--ink)}
#karfaNews a{color:#1B3D8F;text-decoration:none;display:block;padding:3px 0;border-bottom:1px solid var(--border)}
#karfaNews a:last-child{border-bottom:none}
#karfaNews a:hover{text-decoration:underline}

#suggestBtn{background:var(--teal-bg);color:var(--teal);border:none;border-radius:20px;padding:6px 14px;font-family:'DM Sans',sans-serif;font-size:11.5px;font-weight:400;cursor:pointer;transition:opacity .15s}
#suggestBtn:hover{opacity:.7}
#suggestOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center}
#suggestOverlay.vis{display:flex}
#suggestBox{background:var(--ww);border-radius:12px;padding:24px;width:min(420px,92vw);box-shadow:0 8px 32px rgba(0,0,0,.22)}
#suggestBox h3{margin:0 0 4px;font-size:15px;color:var(--ink)}
#suggestBox p{margin:0 0 14px;font-size:12px;color:var(--muted)}
#suggestBox label{font-size:12px;color:var(--soft);display:block;margin-bottom:3px}
#suggestBox textarea,#suggestBox input[type=text]{width:100%;box-sizing:border-box;border:1.5px solid var(--border);border-radius:7px;padding:8px 10px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);background:var(--bg);margin-bottom:12px;resize:vertical}
#suggestBox textarea{height:90px}
#suggestBox textarea:focus,#suggestBox input:focus{outline:none;border-color:var(--teal)}
.suggest-row{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.suggest-row button{border:none;border-radius:7px;padding:8px 18px;font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:500;cursor:pointer}
#suggestSend{background:var(--teal);color:white}
#suggestCancel{background:var(--border);color:var(--soft)}
#suggestThanks{display:none;text-align:center;padding:12px 0 4px;color:var(--teal);font-size:13px;font-weight:500}

@media(max-width:768px) and (orientation:landscape){
  .th-deild,.td-deild,.th-loc,.er td:nth-child(4),.th-date,.td-date,.th-time,.er td:nth-child(5){display:table-cell}
  .tbl{font-size:10px;table-layout:fixed;width:100%}
  .th-event{width:35%}
  .th-deild{width:16%}
  .th-date{width:13%}
  .th-loc{display:none!important}
  .er td:nth-child(4){display:none!important}
  .th-time{width:10%}

  {id:18000,title_is:"Sjóferðir – Hornstrandir og Vigur (frá Ísafirði, daglega)",title_en:"Sjóferðir – Hornstrandir & Vigur (from Ísafjörður, daily)",cat:"utivera",region:"vestfirdir",place:"Ísafjarðarhöfn – Hornstrandir",time:"09:00–17:00",price:"Sjá sjoferdir.is",date:"summer",deild_is:"Sjóferðir – hvalaskoðun og Hornstrandir",deild_en:"Sea travel – whale watching & Hornstrandir",desc_is:"Sjóferðir ehf. flyður gesti til Hornstranda og Vigurey daglega – hvalaskoðun, lundar og melrakkakubbar. Brottför frá Ísafirði. Sjá sjoferdir.is.",desc_en:"Sjóferðir ehf. transports guests to Hornstrandir and Vigur Island daily – whale watching, puffins and arctic fox cubs. Departure from Ísafjörður. See sjoferdir.is.",url:"https://www.sjoferdir.is/",source:"sjoferdir.is",recur:"1,2,3,4,5,6,0",startDate:"2026-6-1",endDate:"2026-8-31"},

let aR="all",aC="all",aD="week",aS="",aFree=false,nextId=500;

/* ── DATE ── */
function setDate(){
  const d=new Date();
  const moIS=["janúar","febrúar","mars","apríl","maí","júní","júlí","ágúst","september","október","nóvember","desember"];
  const moEN=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const dwIS=["Sunnudagur","Mánudagur","Þriðjudagur","Miðvikudagur","Fimmtudagur","Föstudagur","Laugardagur"];
  const dwEN=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  document.getElementById("hDate").textContent=lang==="is"
    ?dwIS[d.getDay()]+", "+d.getDate()+". "+moIS[d.getMonth()]+" "+d.getFullYear()
    :dwEN[d.getDay()]+", "+moEN[d.getMonth()]+" "+d.getDate()+", "+d.getFullYear();
  document.title=lang==="is"?"Kalenda – Viðburðir á Íslandi":"Kalenda – What's on in Iceland";
}

function renderRegions(){
  const rIDs=["all","hofud","sudur","sudurnes","vestur","vestfirdir","nordvestur","nordaustur","austur"];
  document.getElementById("rList").innerHTML=rIDs.map(id=>{
    const cnt=id==="all"?EVENTS.length:EVENTS.filter(e=>e.region===id||e.region==="all").length;
    return`<button class="rb ${id===aR?"on":""}" onclick="selR('${id}')"><span>${tR(id)}</span><span class="rc">${cnt}</span></button>`;
  }).join("");
}


function filtered(){
  return EVENTS.filter(e=>{
    const reg=e.region==="all"||aR==="all"||e.region===aR;
    if(!reg)return false;
    if(aC!=="all"&&e.cat!==aC)return false;
    if(aD==="caldate"){
      if(!selectedCalDate) return false;
      const dates=eventDates(e);
      return dates.includes("all")||dates.includes(selectedCalDate);
    }
    if(aD==="today"||aD==="tomorrow"){
      const _now=new Date();
      const _t=new Date(_now);
      if(aD==="tomorrow") _t.setDate(_t.getDate()+1);
      const _tk=_t.getFullYear()+"-"+(_t.getMonth()+1)+"-"+_t.getDate();
      const dates=eventDates(e);
      return dates.includes("all")||dates.includes(_tk)||e.date===aD;
    }
    const dateMatch=aD==="all"||e.date===aD||
      (aD==="week"  &&(e.date==="today"||e.date==="tomorrow"||e.date==="week"||e.date==="all"))||
      (aD==="month" &&(e.date==="today"||e.date==="tomorrow"||e.date==="week"||e.date==="month"||e.date==="all"||e.date==="summer"))||
      (aD==="summer"&&(e.date==="summer"||e.date==="all"));
    if(!dateMatch)return false;
    if(aFree){
      const p=(e.price||"").toLowerCase();
      if(!p.includes("frjálst")&&!p.includes("ókeypis")&&!p.includes("frítt")&&!p.includes("frjálst inn"))return false;
    }
    if(aS){
      const q=aS.toLowerCase();
      const title=(lang==="is"?e.title_is:e.title_en).toLowerCase();
      const deild=(lang==="is"?e.deild_is:e.deild_en).toLowerCase();
      if(!title.includes(q)&&!e.place.toLowerCase().includes(q)&&!deild.includes(q))return false;
    }
    return true;
  });
}

// Format an ISO key "YYYY-M-D" → "Mán. 4. maí" / "Mon 4 May"
function fmtKey(key){
  const p=key.split("-"); const d=new Date(+p[0],+p[1]-1,+p[2]);
  return (lang==="is"?_dwIS:_dwEN)[d.getDay()]+" "+d.getDate()+". "+(lang==="is"?_moISs:_moENs)[d.getMonth()];
}

function getDateStr(e, specificKey){
  if(specificKey && specificKey!=="all") return fmtKey(specificKey);
  if(e.dateStr_is||e.dateStr_en) return lang==="is"?(e.dateStr_is||e.dateStr_en):(e.dateStr_en||e.dateStr_is);
  const now=new Date();
  if(e.date==="today") return fmtKey(now.getFullYear()+"-"+(now.getMonth()+1)+"-"+now.getDate());
  if(e.date==="tomorrow"){const t=new Date(now);t.setDate(t.getDate()+1);return fmtKey(t.getFullYear()+"-"+(t.getMonth()+1)+"-"+t.getDate());}
  // For events with isoDates, show first upcoming date
  if(e.isoDates&&e.isoDates.length){
    const todayKey=now.getFullYear()+"-"+(now.getMonth()+1)+"-"+now.getDate();
    const upcoming=e.isoDates.find(k=>k>=todayKey)||e.isoDates[e.isoDates.length-1];
    return fmtKey(upcoming);
  }
  if(e.isoDate) return fmtKey(e.isoDate);
  return "";
}

// Expand events into individual date occurrences for the current filter
function expandToOccurrences(evs) {
  const now = new Date();
  const todayKey = now.getFullYear()+"-"+(now.getMonth()+1)+"-"+now.getDate();
  const tomorrow = new Date(now); tomorrow.setDate(now.getDate()+1);
  const tomorrowKey = tomorrow.getFullYear()+"-"+(tomorrow.getMonth()+1)+"-"+tomorrow.getDate();

  // Get the week range (Mon-Sun)
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate()-((now.getDay()+6)%7));
  const weekKeys = [];
  for(let i=0;i<7;i++){const d=new Date(weekStart);d.setDate(weekStart.getDate()+i);weekKeys.push(d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate());}

  // Get month keys
  const dim = new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const monthKeys = Array.from({length:dim},(_,i)=>now.getFullYear()+"-"+(now.getMonth()+1)+"-"+(i+1));

  const results = [];
  evs.forEach(e => {
    const dates = eventDates(e);

    if(aD==="caldate"){
      if(dates.includes("all")||dates.includes(selectedCalDate)){
        results.push({ev:e, key: dates.includes("all") ? null : selectedCalDate});
      }
    } else if(aD==="today"){
      if(dates.includes(todayKey)) results.push({ev:e, key:todayKey});
      else if(e.date==="today") results.push({ev:e, key:todayKey});
    } else if(aD==="tomorrow"){
      if(dates.includes(tomorrowKey)) results.push({ev:e, key:tomorrowKey});
      else if(e.date==="tomorrow") results.push({ev:e, key:tomorrowKey});
    } else if(aD==="week"){
      const matching = dates.includes("all") ? [] : weekKeys.filter(k=>dates.includes(k));
      if(dates.includes("all")){results.push({ev:e,key:null});}
      else if(matching.length) matching.forEach(k=>results.push({ev:e,key:k}));
      else if(e.date==="today") results.push({ev:e,key:todayKey});
      else if(e.date==="tomorrow") results.push({ev:e,key:tomorrowKey});
      else if(e.date==="week") results.push({ev:e,key:null});
    } else if(aD==="month"){
      const matching = dates.includes("all") ? [] : monthKeys.filter(k=>dates.includes(k));
      if(dates.includes("all")){results.push({ev:e,key:null});}
      else if(matching.length) matching.forEach(k=>results.push({ev:e,key:k}));
      else if(["today","tomorrow","week","month"].includes(e.date)) results.push({ev:e,key:null});
    } else {
      // summer / all
      if(dates.length) {
        if(dates.includes("all")){results.push({ev:e,key:null});}
        else { const upcoming=dates.find(k=>k>=todayKey)||dates[0]; results.push({ev:e,key:upcoming}); }
      }
    }
  });

  // Sort by key date
  results.sort((a,b)=>{
    if(!a.key && !b.key) return 0;
    if(!a.key) return 1;
    if(!b.key) return -1;
    return a.key.localeCompare(b.key);
  });
  return results;
}

  const thEv=lang==="is"?"Viðburður":"Event";
  const thDeild=lang==="is"?"Deild/Flokkur":"League";
  const thDate=lang==="is"?"Dagsetning":"Date";

  const thPrice=lang==="is"?"Verð":"Price";

  // Raða eftir tíma – "Allan daginn" og "Sjá dagskrá" fara aftast
  function timeVal(t){
    if(!t||t==="Allan daginn"||t==="Sjá dagskrá"||t==="Sjá heimasíðu"||t==="Eftir samkomulagi")return 9999;
    const m=t.match(/^(\d{1,2}):(\d{2})/);

  }
  occs=[...occs].sort((a,b)=>timeVal(a.ev.time)-timeVal(b.ev.time));

  const rows=occs.map(({ev:e,key})=>{
    const etitle=lang==="is"?e.title_is:e.title_en;

    const isFree=_fp.includes("frjálst")||_fp.includes("ókeypis")||_fp==="frítt"||_fp.includes("frítt");
    const eprice=isFree?"Frjálst":e.price;
    const uid=e.id+"_"+(key||"x");
    return`
      <tr class="er" id="er-${uid}" onclick="toggle('${uid}')">
        <td class="th-event"><div class="td-t"><span class="dot d-${e.cat}"></span><span class="ev-name">${etitle}</span></div></td>
        <td class="td-deild">${edeild}</td>
        <td class="td-date" style="font-size:11.5px;color:var(--soft);white-space:nowrap">${getDateStr(e,key)}</td>
        <td style="display:none;width:0;padding:0"></td>
        <td style="font-size:11.5px;color:var(--soft);text-align:right;white-space:nowrap">${e.time||""}</td>
        <td class="td-price"><span class="${isFree?"pfree":"ppaid"}">${eprice}</span></td>
        <td class="see-td"><button class="sb2" id="btn-${uid}" onclick="event.stopPropagation();toggle('${uid}')">${t("seeMore")}</button></td>
      </tr>
      <tr class="xr" id="xr-${uid}">
        <td class="xc" colspan="7">
          <div class="xi">
            <div class="xd"><div class="xi-title">${etitle}</div><div class="xmeta" style="margin-bottom:4px;font-size:11px">${e.place}${e.time?" · "+e.time:""}</div>${edesc}<div class="xmeta">${t("source")}: ${e.source}</div></div>
            <a class="xl" href="${e.url}" target="_blank">${t("goTo")}</a>
          </div>
        </td>
      </tr>`;
  }).join("");

  const secId="sec-"+title.replace(/\s+/g,"_").replace(/[^a-zA-Z0-9_]/g,"");
  return`<div class="sec-blk">
    <div class="sec-hd" onclick="toggleSec('${secId}')" style="cursor:pointer;user-select:none">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="sec-arrow" id="arr-${secId}">&#9660;</span>
        <h3>${title}</h3><span class="sc">${cnt} ${t("events")}</span>
      </div>
    </div>
    <div id="${secId}">
    <table class="tbl">
      <thead><tr>
        <th class="th-event">${thEv}</th>
        <th class="th-deild">${thDeild}</th>
        <th class="th-date">${thDate}</th>
        <th class="th-loc">${thLoc}</th>
        <th class="th-time" style="text-align:right">${thTime}</th>
        <th class="th-price">${thPrice}</th>
        <th></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    </div></div>`;
}

/* AI fetch fjarlægt – gögn koma frá events.json */


/* ── DAGATAL ── */
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
let calHighlightDate = null; /* "YYYY-M-D" – highlighted when today/tomorrow tab active */
let selectedCalDate = null; // "YYYY-M-D" string

// Month/day name arrays
const _moIS  = ["janúar","febrúar","mars","apríl","maí","júní","júlí","ágúst","september","október","nóvember","desember"];
const _moEN  = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const _moISs = ["jan.","feb.","mar.","apr.","maí","jún.","júl.","ágú.","sep.","okt.","nóv.","des."];
const _moENs = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const _dwIS  = ["Sun.","Mán.","Þri.","Mið.","Fim.","Fös.","Lau."];
const _dwEN  = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

// Compute all dates an event spans – returns array of "YYYY-M-D" strings
// Supports: e.isoDate, e.isoDates[], or e.recur + e.startDate + e.endDate
// recur: "daily" | "0,1,2,3,4,5,6" (weekday numbers, 0=Sun)
// startDate/endDate: "YYYY-M-D"
function eventDates(e) {
  const now   = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const key   = d => d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();

  // Recurrence pattern – generate dates on the fly (never stored as array)
  if (e.recur && e.startDate) {
    const sp = e.startDate.split("-"); const ep = (e.endDate||"2026-12-31").split("-");
    const start = new Date(+sp[0],+sp[1]-1,+sp[2]);
    const end   = new Date(+ep[0],+ep[1]-1,+ep[2]);
    const fromDate = start > today ? start : today;
    const days = e.recur==="daily" ? [0,1,2,3,4,5,6]
                                   : e.recur.split(",").map(Number);
    const keys = [];
    let d = new Date(fromDate);
    while (d <= end && keys.length < 200) {
      if (days.includes(d.getDay())) keys.push(key(d));
      d.setDate(d.getDate()+1);
    }
    return keys.length ? keys : ["all"];
  }

  // Specific ISO date(s) take highest priority
  if (e.isoDates && e.isoDates.length) return e.isoDates;
  if (e.isoDate) return [e.isoDate];

  // Legacy dateStr_is parsing
  function parseDateStr(str) {
    if (!str || str==="Alltaf opið" || str==="Sumarið 2026") return null;
    const m = str.match(/(\d+)\.\s*([^\s\d.]+)/);
    if (!m) return null;
    const day = parseInt(m[1]);
    const mon = m[2].toLowerCase().replace(".","");
    const idx = _moISs.findIndex(x => x.replace(".","")===mon);
    if (idx<0) return null;
    const yr = (idx < now.getMonth()-3) ? now.getFullYear()+1 : now.getFullYear();
    return new Date(yr, idx, day);
  }
  const specific = parseDateStr(e.dateStr_is);
  if (specific) return [key(specific)];

  if (e.date==="today") return [key(today)];
  if (e.date==="tomorrow") { const t=new Date(today);t.setDate(t.getDate()+1);return [key(t)]; }

  if (e.date==="week") {
    const keys=[]; const mon=new Date(today);
    mon.setDate(today.getDate()-((today.getDay()+6)%7));
    for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);keys.push(key(d));}
    return keys;
  }
  if (e.date==="month") {
    const keys=[];
    const dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
    for(let d=1;d<=dim;d++) keys.push(now.getFullYear()+"-"+(now.getMonth()+1)+"-"+d);
    return keys;
  }
  if (e.date==="summer") {
    const keys=[];
    for(let mo=5;mo<=7;mo++){const dim=new Date(now.getFullYear(),mo+1,0).getDate();for(let d=1;d<=dim;d++)keys.push(now.getFullYear()+"-"+(mo+1)+"-"+d);}
    return keys;
  }
  if (e.date==="all") return ["all"];
  return [];
}


// Build a map: dateKey → [events]
function buildDateMap() {
  const map = {};
  EVENTS.forEach(e => {
    const dates = eventDates(e);
    dates.forEach(k => {
      if (!map[k]) map[k]=[];
      map[k].push(e);
    });
  });
  return map;
}

function calNav(dir,ev) {
  if(ev) ev.stopPropagation();
  calMonth += dir;
  if(calMonth<0){calMonth=11;calYear--;}
  if(calMonth>11){calMonth=0;calYear++;}
  renderCal();
}

function renderCal() {
  const label = document.getElementById("calMonthLabel");
  if(!label) return;
  label.textContent = (lang==="is"?_moIS:_moEN)[calMonth]+" "+calYear;

  const dateMap = buildDateMap();
  const now     = new Date();
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const wds = lang==="is" ? ["Su","Má","Þr","Mi","Fi","Fö","La"] : ["Su","Mo","Tu","We","Th","Fr","Sa"];

  let html = wds.map(d=>`<div class="cal-wd">${d}</div>`).join("");
  for(let i=0;i<firstDay;i++) html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++) {
    const k   = calYear+"-"+(calMonth+1)+"-"+d;
    const hasEv = !!(dateMap[k] || dateMap["all"]);
    const isSel = selectedCalDate===k || calHighlightDate===k;
    const isTod = d===now.getDate() && calMonth===now.getMonth() && calYear===now.getFullYear();
    let cls = "cal-day";
    if(hasEv)  cls+=" has-events";
    if(isSel)  cls+=" selected";
    if(isTod && !isSel) cls+=" today-mark";
    html+=`<button class="${cls}" onclick="selectCalDay(${d})">${d}</button>`;
  }
  document.getElementById("calGrid").innerHTML = html;
}

function selectCalDay(day) {
  selectedCalDate = calYear+"-"+(calMonth+1)+"-"+day;
  const d = new Date(calYear, calMonth, day);
  const dayName = (lang==="is"?_dwIS:_dwEN)[d.getDay()];
  const monName = (lang==="is"?_moISs:_moENs)[calMonth];
  const lbl = document.getElementById("calSelLabel");
  if(lbl) lbl.textContent = (lang==="is"?"Valinn dagur: ":"Selected: ")+dayName+" "+day+". "+monName+" "+calYear;
  // deselect date tabs
  document.querySelectorAll(".dt").forEach(b=>b.classList.remove("on"));
  aD = "caldate";
  renderCal();
  render();
}

document.addEventListener("DOMContentLoaded",()=>{
  setDate();renderRegions();renderCal();render();

  /* ── Sækja events.json og bæta við viðburðum ── */
  // Reyna að sækja gögn beint frá gjugg.is (Mobilitus/Vísir API)
  function fetchGjugg() {
    const endpoints = [
      "https://gjugg.is/p/api/events.do?country=IS&lang=is&days=30",
      "https://www.visir.is/p/vidburdir-api?country=IS",
    ];
    return Promise.any(endpoints.map(url =>
      fetch(url, {headers:{"Accept":"application/json"}})
        .then(r => r.ok ? r.json() : Promise.reject())
    )).catch(() => null);
  }
  // Fetch gjugg in background (may or may not work depending on CORS)
  fetchGjugg().then(gjugg => {
    if (gjugg && gjugg.events) {
      const existing = new Set(EVENTS.map(e=>(e.title_is||e.title_en||"").toLowerCase()));
      gjugg.events.forEach(e => {
        const key = (e.title||e.name||"").toLowerCase();
        if (!existing.has(key) && key) {
          existing.add(key);
          EVENTS.push({
            id: 90000 + EVENTS.length,
            title_is: e.title||e.name||"",
            title_en: e.title_en||e.title||e.name||"",
            cat: "adrir",
            region: "hofud",
            place: e.venue||e.location||"",
            time: e.time||e.startTime||"",
            price: e.price||"Sjá visir.is",
            isoDate: (e.date||e.startDate||"").substring(0,10).replace(/-0(\d)/g,"-$1").replace(/^(\d+)-0(\d+)/,"$1-$2"),
            date: "week",
            deild_is: e.category||"Vísir.is",
            deild_en: e.category||"Visir.is",
            desc_is: e.description||e.desc||"",
            desc_en: e.description_en||e.desc||"",
            url: e.url||"https://www.visir.is/vidburdir",
            source: "visir.is/vidburdir"
          });
        }
      });
      renderRegions(); render();
      console.log("Gjugg: bætti við", gjugg.events.length, "viðburðum");
    }
  }).catch(()=>{});

  fetch("events.json")
    .then(r=>r.ok?r.json():null)
    .then(data=>{
      if(!data||!data.events||!data.events.length)return;
      // Bæta við viðburðum úr JSON (forðast tvítekningar)
      const existing=new Set(EVENTS.map(e=>(e.title_is||e.title_en||"").toLowerCase()));
      let added=0;
      data.events.forEach(e=>{
        const key=(e.title_is||e.title_en||"").toLowerCase();
        if(!existing.has(key)){EVENTS.push(e);existing.add(key);added++;}
      });
      // Sýna "síðast uppfært" tíma
      const upd=new Date(data.updated);
      const mo=["jan","feb","mar","apr","maí","jún","júl","ágú","sep","okt","nóv","des"];
      const ts=upd.getDate()+". "+mo[upd.getMonth()]+" kl. "+
        String(upd.getHours()).padStart(2,"0")+":"+String(upd.getMinutes()).padStart(2,"0");
      document.getElementById("updatedBar").textContent=
        (lang==="is"
          ?"Síðast uppfært: "+ts+" · "+data.eventCount+" viðburðir"
          :"Last updated: "+ts+" · "+data.eventCount+" events");
      if(added>0){renderRegions();renderCal();render();}
    })
    .catch(()=>{/* events.json ekki til – notar static gögn */});
  document.getElementById("dtTabs").addEventListener("click",e=>{
    if(!e.target.dataset.d)return;
    document.querySelectorAll(".dt").forEach(b=>b.classList.remove("on"));
    e.target.classList.add("on");
    aD=e.target.dataset.d;
    /* Navigate calendar and highlight day when today/tomorrow selected */
    const now=new Date();
    if(aD==="today"){
      calYear=now.getFullYear(); calMonth=now.getMonth();
      calHighlightDate=now.getFullYear()+"-"+(now.getMonth()+1)+"-"+now.getDate();
      renderCal();
    } else if(aD==="tomorrow"){
      const tom=new Date(now); tom.setDate(tom.getDate()+1);
      calYear=tom.getFullYear(); calMonth=tom.getMonth();
      calHighlightDate=tom.getFullYear()+"-"+(tom.getMonth()+1)+"-"+tom.getDate();
      renderCal();
    } else {
      calHighlightDate=null;
      renderCal();
    }
    render();
  });
  document.getElementById("si").addEventListener("input",e=>{aS=e.target.value.trim();render();});
});
